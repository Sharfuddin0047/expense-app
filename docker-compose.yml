version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_DATABASE: wallet_app
      MYSQL_ROOT_PASSWORD: "Sharfu@8826"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - wallet_app
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  walletapp-backend:
    build:
      context: ./wallet-app
    container_name: walletapp_backend_cont
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - wallet_app
    environment:
      APP_NAME: wallet-app
      DB_HOST: mysql
      DB_USER: root
      DB_PORT: 3306
      DB_NAME: wallet_app
      DB_PASSWORD: Sharfu@8826
      SERVER_PORT: 1011
    expose:
      - "1011"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:1011/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  walletapp-frontend:
    build:
      context: ./walletapp
      args:
        VITE_API_BASE_URL: /api
    container_name: walletapp_frontend_cont
    restart: always
    depends_on:
      walletapp-backend:
        condition: service_healthy
    networks:
      - wallet_app
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    depends_on:
      - walletapp-frontend
      - walletapp-backend
    ports:
      - "80:80"   
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - wallet_app

volumes:
  mysql_data:

networks:
  wallet_app:
    driver: bridge