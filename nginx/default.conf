server {
    listen 80;

    location / {
        proxy_pass http://walletapp-frontend:80;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://walletapp-backend:1011/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}